<!-- 🐄 Поля для скота (Коровы, Бараны, Козы, Лошади, Верблюды) -->
<p class="text-xs text-gray-500 mb-3">🐄 Специальные поля для скота</p>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Порода -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">🧬 Порода</label>
        <input type="text" name="breed"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: Гиссарская, Ахалтекинская, Симментальская">
    </div>

    <!-- Возраст -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">📅 Возраст</label>
        <input type="text" name="age"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: 2 года, 18 месяцев">
    </div>

    <!-- Пол -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">⚥ Пол</label>
        <select name="gender_livestock"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]">
            <option value="">Выберите пол</option>
            <option value="male">Бык / Жеребец / Баран (самец)</option>
            <option value="female">Корова / Кобыла / Овца (самка)</option>
        </select>
    </div>

    <!-- Вес -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">⚖️ Вес (кг)</label>
        <input type="number" name="weight" step="0.1" min="0"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: 350">
    </div>

    <!-- Масть / Цвет -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">🎨 Масть / Цвет</label>
        <input type="text" name="color_variety"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: рыжая, чёрно-белая, серая">
    </div>

    <!-- Статус здоровья -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">🏥 Статус здоровья</label>
        <select name="health_status"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]">
            <option value="unknown">Не указано</option>
            <option value="healthy">Здоров</option>
            <option value="vaccinated">Вакцинирован</option>
            <option value="with_passport">Есть ветпаспорт</option>
        </select>
    </div>

</div>
