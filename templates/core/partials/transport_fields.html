<!-- 🚖 Поля для Зоо-Такси / Перевозки животных -->
<p class="text-xs text-gray-500 mb-3">🚖 Данные о перевозке животных (такси)</p>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Тип транспорта -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">🚗 Тип транспорта *</label>
        <select name="transport_type" required
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]">
            <option value="">Выберите тип</option>
            <option value="sprinter">Спринтер (большой)</option>
            <option value="porter">Портер / Грузовик</option>
            <option value="sedan">Легковая</option>
            <option value="minivan">Минивэн</option>
        </select>
    </div>

    <!-- Откуда -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">📍 Откуда *</label>
        <input type="text" name="route_from" required
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: Душанбе">
    </div>

    <!-- Куда -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">🎯 Куда *</label>
        <input type="text" name="route_to" required
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: Худжанд, Куляб, Хорог">
    </div>

    <!-- Время отправления -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">🕐 Время отправления</label>
        <input type="text" name="departure_time"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: 07:00, 13:00, 18:00">
        <p class="text-xs text-gray-500 mt-1">Укажите все рейсы через запятую</p>
    </div>

    <!-- Дни работы -->
    <div>
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">📅 Дни работы</label>
        <input type="text" name="available_days"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: Ежедневно, Пн-Пт, По заявке">
    </div>

    <!-- Вместимость / Тип груза -->
    <div class="md:col-span-2">
        <label class="block text-sm font-semibold text-[#D4AF37] mb-2">📦 Вместимость / Какие животные</label>
        <input type="text" name="cargo_capacity"
            class="w-full px-4 py-3 rounded-lg border-2 border-gray-700 bg-[#121212] text-white focus:ring-2 focus:ring-[#D4AF37] focus:border-[#D4AF37]"
            placeholder="Например: куры до 50 шт, коровы 2-3 головы, любые животные, клетки в наличии">
        <p class="text-xs text-gray-500 mt-1">Что можете перевезти, в каком количестве</p>
    </div>

</div>

<!-- Разделитель -->
<div class="border-t border-gray-700 mt-4 pt-4">
    <p class="text-xs text-[#D4AF37] font-semibold mb-1">💰 Стоимость и условия</p>
    <p class="text-xs text-gray-500">Укажите цену за перевозку в поле «Цена» ниже. В описании напишите подробные условия: за голову, за рейс или за кг.</p>
</div>
