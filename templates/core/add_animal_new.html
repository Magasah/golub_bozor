{% extends 'base.html' %}

{% block title %}Подать объявление - ЗооБозор{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto" x-data="animalForm()">
    <div class="mb-8">
        <h1 class="text-4xl font-bold text-[#D4AF37] mb-2">📝 Подать объявление</h1>
        <p class="text-gray-400">Заполните форму, чтобы разместить объявление о продаже животного</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <!-- 🎯 ВЫБОР КАТЕГОРИИ (Модальное окно) -->
        <div class="bg-[#1E1E1E] rounded-lg p-6 border border-gray-800">
            <label class="block text-sm font-semibold text-[#D4AF37] mb-4">
                Категория животного *
            </label>
            
            <!-- Кнопка открытия модального окна -->
            <button 
                type="button"
                @click="showCategoryModal = true"
                class="w-full p-6 bg-[#2A2A2A] border-2 border-gray-700 rounded-lg hover:border-[#D4AF37] transition-all duration-300 flex items-center justify-between"
            >
                <div class="flex items-center space-x-4">
                    <span x-show="!selectedCategory" class="text-gray-500">Выберите категорию...</span>
                    <template x-if="selectedCategory">
                        <div class="flex items-center space-x-3">
                            <span class="text-4xl" x-text="getCategoryEmoji()"></span>
                            <span class="text-lg text-white font-semibold" x-text="getCategoryName()"></span>
                        </div>
                    </template>
                </div>
                <svg class="w-6 h-6 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            
            <!-- Скрытое поле для отправки -->
            <input 
                type="hidden" 
                name="category" 
                id="category-input"
                x-model="selectedCategory"
                hx-get="{% url 'load_category_fields' %}"
                hx-trigger="change"
                hx-target="#dynamic-fields"
                hx-swap="innerHTML"
            >
        </div>

        <!-- 🔥 МОДАЛЬНОЕ ОКНО ВЫБОРА КАТЕГОРИИ -->
        <div 
            x-show="showCategoryModal"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="fixed inset-0 z-50 overflow-y-auto"
            style="display: none;"
        >
            <!-- Overlay -->
            <div 
                @click="showCategoryModal = false"
                class="fixed inset-0 bg-black bg-opacity-90"
            ></div>
            
            <!-- Modal Content -->
            <div class="relative min-h-screen flex items-center justify-center p-4">
                <div 
                    @click.away="showCategoryModal = false"
                    class="relative bg-[#121212] border-2 border-[#D4AF37] rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-8"
                >
                    <!-- Header -->
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-bold text-[#D4AF37]">Выберите категорию</h2>
                        <button 
                            type="button"
                            @click="showCategoryModal = false"
                            class="text-gray-400 hover:text-white transition"
                        >
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- Сетка категорий -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <button
                            type="button"
                            @click="selectCategory('dog'); showCategoryModal = false"
                            class="group relative p-6 bg-[#1E1E1E] border-2 rounded-xl transition-all duration-300 hover:border-[#D4AF37] hover:bg-[#2A2A2A] hover:scale-105"
                            :class="selectedCategory === 'dog' ? 'border-[#D4AF37] bg-[#2A2A2A] ring-4 ring-[#D4AF37]/30' : 'border-gray-700'"
                        >
                            <div class="text-5xl mb-3 transition-transform group-hover:scale-110">🐕</div>
                            <div class="text-center text-sm font-semibold text-gray-200 group-hover:text-[#D4AF37]">Собаки</div>
                            <div 
                                x-show="selectedCategory === 'dog'"
                                class="absolute top-2 right-2 w-6 h-6 bg-[#D4AF37] rounded-full flex items-center justify-center"
                            >
                                <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                        </button>

                        <button
                            type="button"
                            @click="selectCategory('cat'); showCategoryModal = false"
                            class="group relative p-6 bg-[#1E1E1E] border-2 rounded-xl transition-all duration-300 hover:border-[#D4AF37] hover:bg-[#2A2A2A] hover:scale-105"
                            :class="selectedCategory === 'cat' ? 'border-[#D4AF37] bg-[#2A2A2A] ring-4 ring-[#D4AF37]/30' : 'border-gray-700'"
                        >
                            <div class="text-5xl mb-3 transition-transform group-hover:scale-110">🐈</div>
                            <div class="text-center text-sm font-semibold text-gray-200 group-hover:text-[#D4AF37]">Кошки</div>
                            <div 
                                x-show="selectedCategory === 'cat'"
                                class="absolute top-2 right-2 w-6 h-6 bg-[#D4AF37] rounded-full flex items-center justify-center"
                            >
                                <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                        </button>

                        <button
                            type="button"
                            @click="selectCategory('pigeon'); showCategoryModal = false"
                            class="group relative p-6 bg-[#1E1E1E] border-2 rounded-xl transition-all duration-300 hover:border-[#D4AF37] hover:bg-[#2A2A2A] hover:scale-105"
                            :class="selectedCategory === 'pigeon' ? 'border-[#D4AF37] bg-[#2A2A2A] ring-4 ring-[#D4AF37]/30' : 'border-gray-700'"
                        >
                            <div class="text-5xl mb-3 transition-transform group-hover:scale-110">🕊️</div>
                            <div class="text-center text-sm font-semibold text-gray-200 group-hover:text-[#D4AF37]">Голуби</div>
                            <div 
                                x-show="selectedCategory === 'pigeon'"
                                class="absolute top-2 right-2 w-6 h-6 bg-[#D4AF37] rounded-full flex items-center justify-center"
                            >
                                <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                        </button>

                        <button
                            type="button"
                            @click="selectCategory('parrot'); showCategoryModal = false"
                            class="group relative p-6 bg-[#1E1E1E] border-2 rounded-xl transition-all duration-300 hover:border-[#D4AF37] hover:bg-[#2A2A2A] hover:scale-105"
                            :class="selectedCategory === 'parrot' ? 'border-[#D4AF37] bg-[#2A2A2A] ring-4 ring-[#D4AF37]/30' : 'border-gray-700'"
                        >
                            <div class="text-5xl mb-3 transition-transform group-hover:scale-110">🦜</div>
                            <div class="text-center text-sm font-semibold text-gray-200 group-hover:text-[#D4AF37]">Попугаи</div>
                            <div 
                                x-show="selectedCategory === 'parrot'"
                                class="absolute top-2 right-2 w-6 h-6 bg-[#D4AF37] rounded-full flex items-center justify-center"
                            >
                                <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                        </button>

                        <!-- Добавьте остальные 14 категорий аналогично -->
                        <button
                            type="button"
                            @click="selectCategory('horse'); showCategoryModal = false"
                            class="group relative p-6 bg-[#1E1E1E] border-2 rounded-xl transition-all duration-300 hover:border-[#D4AF37] hover:bg-[#2A2A2A] hover:scale-105"
                            :class="selectedCategory === 'horse' ? 'border-[#D4AF37] bg-[#2A2A2A] ring-4 ring-[#D4AF37]/30' : 'border-gray-700'"
                        >
                            <div class="text-5xl mb-3 transition-transform group-hover:scale-110">🐴</div>
                            <div class="text-center text-sm font-semibold text-gray-200 group-hover:text-[#D4AF37]">Лошади</div>
                        </button>

                        <button
                            type="button"
                            @click="selectCategory('cow'); showCategoryModal = false"
                            class="group relative p-6 bg-[#1E1E1E] border-2 rounded-xl transition-all duration-300 hover:border-[#D4AF37] hover:bg-[#2A2A2A] hover:scale-105"
                            :class="selectedCategory === 'cow' ? 'border-[#D4AF37] bg-[#2A2A2A] ring-4 ring-[#D4AF37]/30' : 'border-gray-700'"
                        >
                            <div class="text-5xl mb-3 transition-transform group-hover:scale-110">🐄</div>
                            <div class="text-center text-sm font-semibold text-gray-200 group-hover:text-[#D4AF37]">Коровы</div>
                        </button>

                        <!-- Добавьте все остальные категории -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 📋 ДИНАМИЧЕСКИЕ ПОЛЯ (загружаются через HTMX) -->
        <div id="dynamic-fields" class="space-y-6">
            <!-- Сюда будут подгружаться поля через HTMX -->
        </div>

        <!-- 📸 ЗАГРУЗКА ФОТО С VIP ЛИМИТАМИ -->
        <div class="bg-[#1E1E1E] rounded-lg p-6 border border-gray-800">
            <label class="block text-sm font-semibold text-[#D4AF37] mb-4">
                Фотографии *
                <span class="text-xs text-gray-500 ml-2">
                    {% if request.user.profile.is_vip %}
                        (VIP: до 6 фото)
                    {% else %}
                        (Стандарт: до 4 фото | <a href="{% url 'vip_request' %}" class="text-[#D4AF37] hover:text-white underline">Получить VIP</a>)
                    {% endif %}
                </span>
            </label>
            
            <!-- Drag & Drop Area -->
            <div 
                x-data="{ isDragging: false }"
                @drop.prevent="handleFileDrop($event)"
                @dragover.prevent="isDragging = true"
                @dragleave.prevent="isDragging = false"
                :class="isDragging ? 'border-[#D4AF37] bg-[#D4AF37]/10' : 'border-gray-700'"
                class="relative border-2 border-dashed rounded-lg p-8 text-center transition-all duration-300"
            >
                <input 
                    type="file" 
                    name="photos" 
                    id="photo-upload"
                    multiple 
                    accept="image/*"
                    class="hidden"
                    @change="previewPhotos($event)"
                >
                
                <label for="photo-upload" class="cursor-pointer">
                    <div class="space-y-4">
                        <svg class="mx-auto h-16 w-16 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <div class="text-gray-300">
                            <span class="text-[#D4AF37] font-semibold">Нажмите для загрузки</span>
                            <span class="block text-sm text-gray-500 mt-1">или перетащите файлы сюда</span>
                        </div>
                        <p class="text-xs text-gray-500">PNG, JPG, WEBP до 5MB</p>
                    </div>
                </label>
            </div>
            
            <!-- Предпросмотр фото -->
            <div id="photo-preview" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4"></div>
        </div>

        <!-- 💰 ЦЕНА -->
        <div class="bg-[#1E1E1E] rounded-lg p-6 border border-gray-800">
            <label for="price" class="block text-sm font-semibold text-[#D4AF37] mb-2">
                Цена (TJS) *
            </label>
            <input 
                type="number" 
                name="price" 
                id="price"
                required
                min="0"
                class="w-full px-4 py-3 bg-[#2A2A2A] border border-gray-700 rounded-lg text-white focus:border-[#D4AF37] focus:ring-2 focus:ring-[#D4AF37]/50 transition"
                placeholder="Введите цену..."
            >
        </div>

        <!-- 🏙️ ГОРОД -->
        <div class="bg-[#1E1E1E] rounded-lg p-6 border border-gray-800">
            <label for="city" class="block text-sm font-semibold text-[#D4AF37] mb-2">
                Город *
            </label>
            <select 
                name="city" 
                id="city"
                required
                class="w-full px-4 py-3 bg-[#2A2A2A] border border-gray-700 rounded-lg text-white focus:border-[#D4AF37] focus:ring-2 focus:ring-[#D4AF37]/50 transition"
            >
                <option value="">Выберите город</option>
                <option value="dushanbe">Душанбе</option>
                <option value="khujand">Худжанд</option>
                <option value="kulob">Кулоб</option>
                <option value="qurghonteppa">Курган-Тюбе</option>
                <option value="istaravshan">Истаравшан</option>
            </select>
        </div>

        <!-- 📝 ОПИСАНИЕ -->
        <div class="bg-[#1E1E1E] rounded-lg p-6 border border-gray-800">
            <label for="description" class="block text-sm font-semibold text-[#D4AF37] mb-2">
                Описание
            </label>
            <textarea 
                name="description" 
                id="description"
                rows="5"
                class="w-full px-4 py-3 bg-[#2A2A2A] border border-gray-700 rounded-lg text-white focus:border-[#D4AF37] focus:ring-2 focus:ring-[#D4AF37]/50 transition resize-none"
                placeholder="Расскажите подробнее о животном..."
            ></textarea>
        </div>

        <!-- 🚀 КНОПКА ОТПРАВКИ -->
        <div class="flex gap-4">
            <button 
                type="submit"
                class="flex-1 px-8 py-4 bg-[#D4AF37] text-black font-bold text-lg rounded-lg hover:bg-[#C5A028] transition-all duration-300 flex items-center justify-center space-x-2"
            >
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <span>Опубликовать объявление</span>
            </button>
            <a 
                href="{% url 'home' %}"
                class="px-8 py-4 border-2 border-gray-700 text-gray-300 font-semibold rounded-lg hover:border-[#D4AF37] hover:text-[#D4AF37] transition-all duration-300"
            >
                Отмена
            </a>
        </div>
    </form>
</div>

<script>
function animalForm() {
    return {
        showCategoryModal: false,
        selectedCategory: '',
        maxPhotos: {% if request.user.profile.is_vip %}6{% else %}4{% endif %},
        
        categories: {
            'dog': { emoji: '🐕', name: 'Собаки' },
            'cat': { emoji: '🐈', name: 'Кошки' },
            'pigeon': { emoji: '🕊️', name: 'Голуби' },
            'parrot': { emoji: '🦜', name: 'Попугаи' },
            'bird_other': { emoji: '🐦', name: 'Другие птицы' },
            'horse': { emoji: '🐴', name: 'Лошади' },
            'cow': { emoji: '🐄', name: 'Коровы' },
            'goat': { emoji: '🐐', name: 'Козы' },
            'sheep': { emoji: '🐑', name: 'Овцы' },
            'rabbit': { emoji: '🐰', name: 'Кролики' },
            'hamster': { emoji: '🐹', name: 'Хомяки' },
            'turtle': { emoji: '🐢', name: 'Черепахи' },
            'fish': { emoji: '🐠', name: 'Рыбы' },
            'reptile': { emoji: '🦎', name: 'Рептилии' },
            'chicken': { emoji: '🐓', name: 'Куры' },
            'duck': { emoji: '🦆', name: 'Утки' },
            'veterinarian': { emoji: '👨‍⚕️', name: 'Ветеринары' },
            'other': { emoji: '🦁', name: 'Другие' }
        },
        
        selectCategory(value) {
            this.selectedCategory = value;
            document.getElementById('category-input').dispatchEvent(new Event('change'));
        },
        
        getCategoryEmoji() {
            return this.categories[this.selectedCategory]?.emoji || '';
        },
        
        getCategoryName() {
            return this.categories[this.selectedCategory]?.name || '';
        },
        
        previewPhotos(event) {
            const files = event.target.files;
            const preview = document.getElementById('photo-preview');
            preview.innerHTML = '';
            
            if (files.length > this.maxPhotos) {
                alert(`❌ Лимит фото превышен! {% if request.user.profile.is_vip %}VIP пользователи могут загрузить до 6 фото.{% else %}Стандартные пользователи могут загрузить до 4 фото. Купите VIP для увеличения лимита до 6 фото.{% endif %}`);
                event.target.value = '';
                return;
            }
            
            Array.from(files).forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML += `
                        <div class="relative group">
                            <img src="${e.target.result}" class="w-full h-32 object-cover rounded-lg border-2 border-gray-700">
                            <button 
                                type="button" 
                                onclick="this.parentElement.remove()"
                                class="absolute top-2 right-2 w-6 h-6 bg-red-600 rounded-full opacity-0 group-hover:opacity-100 transition flex items-center justify-center"
                            >
                                <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                </svg>
                            </button>
                        </div>
                    `;
                };
                reader.readAsDataURL(file);
            });
        },
        
        handleFileDrop(event) {
            const files = event.dataTransfer.files;
            document.getElementById('photo-upload').files = files;
            this.previewPhotos({ target: { files } });
            this.isDragging = false;
        }
    }
}
</script>

<!-- Alpine.js CDN -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<!-- HTMX CDN -->
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
{% endblock %}
